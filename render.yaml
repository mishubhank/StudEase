services:
  - type: web
    name: studease-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci && npm run build && npm run migrate:deploy
    startCommand: npm run start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLOUD_NAME
        sync: false
      - key: API_KEY
        sync: false
      - key: API_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
